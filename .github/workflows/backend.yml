name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend-coolify/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend-coolify/**"
      - ".github/workflows/backend.yml"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.lunalive.net
  IMAGE_NAME: backend-coolify-app

defaults:
  run:
    working-directory: backend-coolify

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew --no-daemon build

  publish:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only publish/deploy from main, never from pull requests.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend-coolify
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: echo "Deploying image"

      - name: Trigger Deploy
        run: |
          curl ${{ secrets.COOLIFY_BACKEND_WEBHOOK }} \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
