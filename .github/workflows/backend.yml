name: Backend CI/CD - V1

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - "backend-coolify/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend-coolify

permissions:
  contents: read
    
env:
  REGISTRY: registry.lunalive.net
  IMAGE_NAME: backend-coolify-app

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cancel superseded build/test runs on the same ref to save CI minutes.
    concurrency:
      group: backend-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run tests
        run: ./gradlew test

  publish:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    concurrency:
      group: backend-build-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: backend-coolify
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.sha }}
          labels: |
            ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "tags: ${{ steps.meta.outputs.tags }}"
          echo "image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "version: ${{ github.sha }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 10
    # Never cancel an in-flight production deploy; queue new ones instead.
    concurrency:
      group: backend-deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger Deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_BACKEND_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "Triggering Coolify deploy webhook"
          echo "Digest: ${{ needs.publish.outputs.digest }}"
          status=$(curl -sS -o /dev/null -w "%{http_code}" -X GET "$WEBHOOK" \
            -H "Authorization: Bearer $TOKEN")
          echo "Webhook responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify webhook failed with HTTP $status"
            exit 1
          fi
