name: Backend CI/CD - V1

on:
  push:
    branches:
      - "main"
    paths:
      - "backend-coolify/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "backend-coolify/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend-coolify

env:
  REGISTRY: registry.lunalive.net
  IMAGE_NAME: backend-coolify-app

jobs:
  test:
    name: Test runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  publish:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend-coolify
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          #labels: ${{ steps.meta.outputs.labels }}

      - name: Print image info
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "tags: ${{ steps.meta.outputs.tags }}"
          echo "image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "version: ${{ github.sha }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_BACKEND_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "Triggering Coolify deploy webhook"
          echo "Digester: ${{ needs.publish.outputs.digest }}"
          curl -s -o /dev/null -w "%{http_code}" -X GET "$WEBHOOK" \
            -H "Authorization: Bearer $TOKEN"
