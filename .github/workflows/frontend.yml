/*
name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend-coolify/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend-coolify/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spring-coolify-frontend

defaults:
  run:
    working-directory: frontend-coolify

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-coolify/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check / lint
        run: npm run lint

      - name: Build
        run: npm run build

  publish:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend-coolify
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    steps:
      - name: Call Coolify deploy webhook
        env:
          WEBHOOK: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ] || [ -z "$TOKEN" ]; then
            echo "::warning::COOLIFY_FRONTEND_WEBHOOK or COOLIFY_TOKEN not set; skipping deploy."
            exit 0
          fi
          curl --fail --silent --show-error \
            --request GET "$WEBHOOK" \
            --header "Authorization: Bearer $TOKEN"
*/